<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFMA-ENVIRONMENT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #eaeaea;
      background: #ffffff;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: #2e7d32;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.3px;
    }

    .header-subtitle {
      font-size: 0.82rem;
      color: #888;
    }

    /* ===== MAIN ===== */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 32px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .panel-title {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #999;
      margin-bottom: 16px;
    }

    /* ===== LEFT COLUMN ===== */
    .camera-wrapper {
      position: relative;
      background: #f5f5f5;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #eaeaea;
    }

    .camera-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .camera-wrapper canvas { display: none; }

    .camera-placeholder {
      text-align: center;
      color: #bbb;
      padding: 20px;
    }

    .camera-placeholder .icon {
      font-size: 2.4rem;
      margin-bottom: 6px;
      opacity: 0.5;
    }

    .camera-placeholder span {
      display: block;
      font-size: 0.85rem;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      background: #f5f5f5;
      color: #333;
    }

    .btn:hover { background: #eaeaea; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #2e7d32;
      color: #fff;
      border-color: #2e7d32;
    }

    .btn-primary:hover:not(:disabled) { background: #1b5e20; }

    .btn-secondary {
      background: transparent;
      color: #2e7d32;
      border-color: #2e7d32;
    }

    .btn-secondary:hover:not(:disabled) { background: #f1f8e9; }

    .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

    /* ===== RIGHT COLUMN - PREVIEW ===== */
    .preview-area {
      background: #fafafa;
      border-radius: 10px;
      border: 1px solid #eaeaea;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-area img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .preview-empty {
      text-align: center;
      color: #bbb;
      padding: 20px;
    }

    .preview-empty .icon {
      font-size: 2.4rem;
      opacity: 0.4;
      margin-bottom: 6px;
    }

    .preview-empty span {
      display: block;
      font-size: 0.85rem;
    }

    /* ===== AUTO ROW ===== */
    .auto-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #eaeaea;
    }

    .auto-row span {
      font-size: 0.8rem;
      color: #666;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.25s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.25s;
    }

    .toggle input:checked + .slider { background: #2e7d32; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ===== STATUS ===== */
    .camera-status {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #999;
      min-height: 1.2em;
    }

    .camera-status.active { color: #2e7d32; }
    .camera-status.waiting { color: #f9a825; }
    .camera-status.analyzing { color: #1565c0; }
    .camera-status.done { color: #2e7d32; }

    /* ===== MESSAGE ===== */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .msg.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border-left: 3px solid #c62828;
    }

    .msg.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 3px solid #2e7d32;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      max-width: 560px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      padding: 32px;
      position: relative;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #aaa;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      line-height: 1;
    }

    .modal-close:hover { color: #333; background: #f5f5f5; }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 20px;
      padding-right: 28px;
    }

    .modal-body .field { margin-bottom: 16px; }
    .modal-body .field:last-child { margin-bottom: 0; }

    .modal-body .field-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #aaa;
      margin-bottom: 3px;
    }

    .modal-body .field-value {
      font-size: 0.92rem;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .modal-body .field-value.high { color: #2e7d32; font-weight: 600; }
    .modal-body .field-value.medium { color: #f9a825; font-weight: 600; }
    .modal-body .field-value.low { color: #c62828; font-weight: 600; }

    .modal-body .harm-list { list-style: none; padding: 0; }

    .modal-body .harm-list li {
      padding: 4px 0 4px 16px;
      position: relative;
      font-size: 0.88rem;
      color: #333;
    }

    .modal-body .harm-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      width: 5px;
      height: 5px;
      background: #ccc;
      border-radius: 50%;
    }

    .modal-footer { margin-top: 24px; text-align: right; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 820px) {
      .main {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 20px 16px 32px;
      }

      .header {
        padding: 14px 16px;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .modal { padding: 24px 20px; margin: 10px; }
    }

    @media (max-width: 480px) {
      .btn-row { flex-direction: column; }
      .btn { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">IE</div>
      <h1>IFMA-ENVIRONMENT</h1>
    </div>
    <span class="header-subtitle">Analise ambiental de objetos por imagem</span>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- ===== LEFT COLUMN ===== -->
    <section>
      <div class="panel-title">Imagem do objeto</div>
      <div class="msg" id="message"></div>

      <div class="camera-wrapper" id="cameraWrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <div class="icon">&#x1F4F7;</div>
          <span>Ative a camera para visualizar o objeto</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btnCamera">Ativar camera</button>
        <button class="btn btn-secondary" id="btnCapture" disabled>Capturar e analisar</button>
        <button class="btn" id="btnUpload">Enviar imagem</button>
        <button class="btn btn-sm" id="btnSwap" style="display:none;">Trocar imagem</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>

      <div class="auto-row" id="autoRow" style="display:none;">
        <label class="toggle">
          <input type="checkbox" id="autoToggle" />
          <span class="slider"></span>
        </label>
        <span>Modo automatico</span>
      </div>

      <div class="camera-status" id="cameraStatus"></div>
    </section>

    <!-- ===== RIGHT COLUMN ===== -->
    <section>
      <div class="panel-title">Previa da imagem</div>

      <div class="preview-area" id="previewArea">
        <img id="previewImg" alt="Preview da imagem" style="display:none;" />
        <div class="preview-empty" id="previewEmpty">
          <div class="icon">&#x1F5BC;</div>
          <span>Nenhuma imagem selecionada ainda.</span>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-title">Detalhes da analise</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modalCloseBtn">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // DOM Elements
    // ============================================================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const previewImg = document.getElementById('previewImg');
    const previewEmpty = document.getElementById('previewEmpty');
    const message = document.getElementById('message');

    const btnCamera = document.getElementById('btnCamera');
    const btnCapture = document.getElementById('btnCapture');
    const btnUpload = document.getElementById('btnUpload');
    const btnSwap = document.getElementById('btnSwap');
    const fileInput = document.getElementById('fileInput');

    const autoRow = document.getElementById('autoRow');
    const autoToggle = document.getElementById('autoToggle');
    const cameraStatus = document.getElementById('cameraStatus');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // ============================================================
    // State
    // ============================================================
    var stream = null;
    var cameraOn = false;
    var currentBlob = null;
    var isAnalyzing = false;
    var lastAnalysisResult = null;
    var modalOpen = false;

    // Auto-detect
    var autoModeEnabled = false;
    var lastAnalysisTime = 0;
    var lastFrameSignature = null;
    var lastAnalyzedSignature = null;
    var stableFrameCount = 0;

    var AUTO_COOLDOWN_MS = 30000;
    var FRAME_CHECK_INTERVAL_MS = 1000;
    var REQUIRED_STABLE_FRAMES = 2;
    var CHANGE_THRESHOLD = 25;

    var autoInterval = null;

    // ============================================================
    // Camera
    // ============================================================
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'environment' },
          audio: false,
        });
        video.srcObject = stream;
        cameraOn = true;

        cameraPlaceholder.style.display = 'none';
        video.style.display = 'block';
        btnCamera.textContent = 'Camera ativa';
        btnCamera.disabled = true;
        btnCapture.disabled = false;
        autoRow.style.display = 'flex';

        setStatus('active', 'Camera ativa');
        hideMessage();
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          showMessage('error', 'Nao foi possivel acessar a camera. Verifique a permissao do navegador.');
        } else if (err.name === 'NotFoundError') {
          showMessage('error', 'Nenhuma camera encontrada no dispositivo.');
        } else {
          showMessage('error', 'Erro ao acessar a camera: ' + err.message);
        }
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(function(t) { t.stop(); });
        stream = null;
      }
      cameraOn = false;
      video.style.display = 'none';
      cameraPlaceholder.style.display = 'block';
      btnCamera.textContent = 'Ativar camera';
      btnCamera.disabled = false;
      btnCapture.disabled = true;
      autoRow.style.display = 'none';
      stopAutoDetect();
      setStatus('', 'Camera desligada');
    }

    function captureFrame() {
      if (!cameraOn) return null;
      var ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0);
      return canvas;
    }

    // ============================================================
    // Preview
    // ============================================================
    function showPreview(src) {
      previewImg.src = src;
      previewImg.style.display = 'block';
      previewEmpty.style.display = 'none';
    }

    function clearPreview() {
      previewImg.style.display = 'none';
      previewEmpty.style.display = 'block';
      previewImg.src = '';
    }

    // ============================================================
    // Auto-detect
    // ============================================================
    function startAutoDetect() {
      if (autoInterval) return;
      autoModeEnabled = true;
      lastFrameSignature = null;
      stableFrameCount = 0;

      autoInterval = setInterval(function() {
        if (!cameraOn || isAnalyzing || !autoModeEnabled) return;

        var now = Date.now();
        if (now - lastAnalysisTime < AUTO_COOLDOWN_MS) {
          var rem = Math.round((AUTO_COOLDOWN_MS - (now - lastAnalysisTime)) / 1000);
          setStatus('waiting', 'Modo automatico - aguardando cooldown (' + rem + 's)');
          return;
        }

        var ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.drawImage(video, 0, 0);

        var small = document.createElement('canvas');
        small.width = 64;
        small.height = 48;
        var sCtx = small.getContext('2d');
        sCtx.drawImage(canvas, 0, 0, 64, 48);
        var data = sCtx.getImageData(0, 0, 64, 48).data;
        var sig = Array.prototype.map.call(data, function(v) { return v; }).join(',');

        if (lastFrameSignature === null) {
          lastFrameSignature = sig;
          setStatus('waiting', 'Modo automatico - aguardando objeto...');
          return;
        }

        var diff = computeDiff(lastFrameSignature, sig);
        lastFrameSignature = sig;

        if (diff > CHANGE_THRESHOLD) {
          stableFrameCount = 0;
          setStatus('waiting', 'Modo automatico - movimento detectado, aguardando estabilidade...');
        } else {
          stableFrameCount++;
          if (stableFrameCount >= REQUIRED_STABLE_FRAMES) {
            if (lastAnalyzedSignature) {
              var change = computeDiff(lastAnalyzedSignature, sig);
              if (change < 8) {
                setStatus('done', 'Modo automatico - objeto ja analisado');
                stableFrameCount = 0;
                return;
              }
            }
            setStatus('analyzing', 'Novo objeto detectado - analisando...');
            stableFrameCount = 0;
            doCaptureAndAnalyze();
          } else {
            setStatus('waiting', 'Modo automatico - estabilizando (' + stableFrameCount + '/' + REQUIRED_STABLE_FRAMES + ')');
          }
        }
      }, FRAME_CHECK_INTERVAL_MS);
    }

    function stopAutoDetect() {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
      }
      autoModeEnabled = false;
      lastFrameSignature = null;
      stableFrameCount = 0;
    }

    function computeDiff(a, b) {
      var arrA = a.split(',');
      var arrB = b.split(',');
      var len = Math.min(arrA.length, arrB.length);
      var total = 0;
      for (var i = 0; i < len; i++) {
        total += Math.abs(parseInt(arrA[i] || 0) - parseInt(arrB[i] || 0));
      }
      return total / (len || 1);
    }

    // ============================================================
    // Capture & Analyze
    // ============================================================
    async function doCaptureAndAnalyze() {
      if (isAnalyzing) {
        showMessage('error', 'Uma analise ja esta em andamento. Aguarde.');
        return;
      }
      isAnalyzing = true;

      var blob = null;

      if (cameraOn) {
        var c = captureFrame();
        if (!c) { isAnalyzing = false; return; }

        var dataURL = c.toDataURL('image/jpeg', 0.85);
        showPreview(dataURL);

        blob = await new Promise(function(r) { c.toBlob(function(b) { r(b); }, 'image/jpeg', 0.85); });
      } else if (currentBlob) {
        blob = currentBlob;
      } else {
        showMessage('error', 'Capture ou envie uma imagem antes de analisar.');
        isAnalyzing = false;
        return;
      }

      if (cameraOn) {
        var ctx = canvas.getContext('2d');
        var small = document.createElement('canvas');
        small.width = 64;
        small.height = 48;
        var sCtx = small.getContext('2d');
        sCtx.drawImage(canvas, 0, 0, 64, 48);
        lastAnalyzedSignature = Array.prototype.map.call(
          sCtx.getImageData(0, 0, 64, 48).data,
          function(v) { return v; }
        ).join(',');
      }

      setStatus('analyzing', 'Analisando imagem...');
      btnCapture.disabled = true;
      btnUpload.disabled = true;

      await sendToAPI(blob);

      lastAnalysisTime = Date.now();
      isAnalyzing = false;
      if (cameraOn) btnCapture.disabled = false;
      btnUpload.disabled = false;
    }

    // ============================================================
    // API
    // ============================================================
    async function sendToAPI(blob) {
      hideMessage();

      try {
        var fd = new FormData();
        fd.append('foto', blob, 'foto.jpg');

        var resp = await fetch('/analisar', { method: 'POST', body: fd });
        var data = await resp.json();

        if (!resp.ok) {
          var msg = 'Nao foi possivel analisar a imagem agora.';
          if (resp.status === 429) {
            msg = 'Limite de requisicoes atingido. Aguarde alguns instantes antes de tentar novamente.';
          } else if (data.erro) {
            msg = data.erro;
          }
          showMessage('error', msg);
          setStatus('', '');
          return;
        }

        var info = data.dados;
        lastAnalysisResult = info;

        setStatus('done', 'Analise concluida');
        showMessage('success', 'Analise concluida com sucesso.');

        if (modalOpen) {
          updateModalContent(info);
        } else {
          openModal(info);
        }

      } catch (err) {
        showMessage('error', 'Nao foi possivel analisar a imagem agora.');
        setStatus('', '');
      }
    }

    // ============================================================
    // Modal
    // ============================================================
    function openModal(info) {
      if (!info) return;
      updateModalContent(info);
      modalOverlay.classList.add('open');
      modalOpen = true;
    }

    function updateModalContent(info) {
      var conf = (info.confianca || 'media').toLowerCase();
      var confClass = 'medium';
      if (conf === 'alta') confClass = 'high';
      else if (conf === 'baixa') confClass = 'low';

      var harms = '';
      if (info.maleficios_ambientais && info.maleficios_ambientais.length > 0) {
        harms = '<ul class="harm-list">';
        for (var i = 0; i < info.maleficios_ambientais.length; i++) {
          harms += '<li>' + info.maleficios_ambientais[i] + '</li>';
        }
        harms += '</ul>';
      } else {
        harms = '<span class="field-value">Nao informado</span>';
      }

      modalBody.innerHTML =
        '<div class="field">' +
          '<div class="field-label">Objeto</div>' +
          '<div class="field-value">' + (info.objeto || 'Nao identificado') + '</div>' +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Material principal</div>' +
          '<div class="field-value">' + (info.material_principal || '--') + '</div>' +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Confianca</div>' +
          '<div class="field-value ' + confClass + '">' + (conf.charAt(0).toUpperCase() + conf.slice(1)) + '</div>' +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Tempo estimado de decomposicao</div>' +
          '<div class="field-value">' + (info.tempo_decomposicao_estimado || '--') + '</div>' +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Maleficios ambientais</div>' +
          harms +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Descarte recomendado</div>' +
          '<div class="field-value">' + (info.descarte_recomendado || '--') + '</div>' +
        '</div>' +
        '<div class="field">' +
          '<div class="field-label">Observacao</div>' +
          '<div class="field-value">' + (info.observacao || '--') + '</div>' +
        '</div>';
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      modalOpen = false;
    }

    // ============================================================
    // Helpers
    // ============================================================
    function showMessage(type, text) {
      message.className = 'msg ' + type;
      message.textContent = text;
    }

    function hideMessage() {
      message.className = 'msg';
      message.textContent = '';
    }

    function setStatus(type, text) {
      cameraStatus.className = 'camera-status';
      if (type) cameraStatus.classList.add(type);
      cameraStatus.textContent = text || '';
    }

    function resetAll() {
      clearPreview();
      if (modalOpen) closeModal();
      lastAnalysisResult = null;
      currentBlob = null;
      hideMessage();
      setStatus('', '');
    }

    // ============================================================
    // Events
    // ============================================================
    btnCamera.addEventListener('click', function() {
      if (!cameraOn) startCamera();
    });

    btnCapture.addEventListener('click', doCaptureAndAnalyze);

    btnUpload.addEventListener('click', function() {
      fileInput.click();
    });

    fileInput.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;

      currentBlob = file;

      var reader = new FileReader();
      reader.onload = function(ev) {
        showPreview(ev.target.result);
        btnSwap.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);

      if (cameraOn) stopCamera();
      hideMessage();
      setStatus('', 'Imagem enviada');

      doCaptureAndAnalyze();
    });

    btnSwap.addEventListener('click', function() {
      resetAll();
      btnSwap.style.display = 'none';
      fileInput.value = '';
    });

    autoToggle.addEventListener('change', function() {
      if (autoToggle.checked) {
        startAutoDetect();
      } else {
        stopAutoDetect();
        if (cameraOn) setStatus('active', 'Camera ativa. Modo automatico desligado.');
      }
    });

    modalClose.addEventListener('click', closeModal);
    modalCloseBtn.addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) closeModal();
    });

    // Ctrl + X to close modal
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'x' && modalOpen) {
        e.preventDefault();
        closeModal();
      }
    });

    // ============================================================
    // Server check
    // ============================================================
    (async function() {
      try {
        var r = await fetch('/status');
        var s = await r.json();
        if (!s.api_key_configurada) {
          showMessage('error', 'Chave da API OpenAI nao configurada. Edite o arquivo .env e reinicie o servidor.');
        }
      } catch (err) {
        showMessage('error', 'Servidor nao encontrado. Execute "npm start" para iniciar.');
      }
    })();
  </script>

</body>
</html>
